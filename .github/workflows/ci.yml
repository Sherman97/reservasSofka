name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════════
  #  PRUEBAS DE COMPONENTE — Backend (sin Spring context pesado)
  # ════════════════════════════════════════════════════════════
  component-tests:
    name: "🧩 Component Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - bookings-service
          - api-gateway
          - inventory-service
          - locations-service
          - notifications-service

    defaults:
      run:
        shell: bash
        working-directory: Backend/services/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run component tests
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon componentTest

  # ════════════════════════════════════════════════════════════
  #  PRUEBAS DE INTEGRACIÓN — Backend (SpringBootTest, DB, etc.)
  # ════════════════════════════════════════════════════════════
  integration-tests:
    name: "🔗 Integration Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - bookings-service
          - api-gateway
          - inventory-service
          - locations-service
          - notifications-service

    defaults:
      run:
        shell: bash
        working-directory: Backend/services/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run integration tests
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon integrationTest

  # ════════════════════════════════════════════════════════════
  #  FRONTEND — Lint + Unit Tests
  # ════════════════════════════════════════════════════════════
  frontend:
    name: "🌐 Frontend"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: |
          if ! node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            echo "No test script, skipping"
            exit 0
          fi
          npm test

  # ════════════════════════════════════════════════════════════
  #  PRUEBAS DE CAJA NEGRA — API (Postman / Newman)
  # ════════════════════════════════════════════════════════════
  blackbox-tests:
    name: "📦 Black-Box Tests (API)"
    runs-on: ubuntu-latest
    needs: [component-tests, integration-tests, frontend]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.override.yml \
            up -d --build
          echo "Waiting for services to be healthy..."

          # Wait for database migrations
          docker compose -f docker-compose.prod.yml -f docker-compose.override.yml \
            wait --timeout 120 database || true

          # Wait for backend through gateway
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000/auth/login > /dev/null 2>&1 || \
               curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "API not ready in 90s"
              docker compose -f docker-compose.prod.yml -f docker-compose.override.yml logs api-gateway auth-service bookings-service
              exit 1
            fi
            sleep 1
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Newman Tests
        run: |
          npm i -g newman
          newman run Backend/tests/blackbox/reservas-api.postman_collection.json

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.override.yml \
            down -v
